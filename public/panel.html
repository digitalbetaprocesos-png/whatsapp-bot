<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Panel WhatsApp</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
display:flex;
height:100vh;
margin:0;
background:#e5ddd5;
background-image:url("https://i.imgur.com/6Iej2c3.png");
background-size:300px;
}

/* PANEL CLIENTES */

#clientes{
width:30%;
background:white;
border-right:1px solid #ccc;
overflow:auto;
}

/* CLIENTE */

.cliente{
display:flex;
align-items:center;
gap:10px;
padding:12px;
cursor:pointer;
border-bottom:1px solid #eee;
transition:0.2s;
}

.cliente:hover{
background:#f0f2f5;
}

.cliente img{
width:40px;
height:40px;
border-radius:50%;
}

/* PANEL CHAT */

#chat{
width:70%;
display:flex;
flex-direction:column;
}

/* HEADER */

#header{
background:#075E54;
color:white;
padding:12px 15px;
font-weight:bold;
display:flex;
align-items:center;
gap:10px;
}

#header img{
width:35px;
height:35px;
border-radius:50%;
}

/* MENSAJES */

#mensajes{
flex:1;
overflow:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

/* BURBUJAS */

.mensaje{
padding:10px 14px;
border-radius:8px;
max-width:65%;
font-size:14px;
position:relative;
box-shadow:0 1px 1px rgba(0,0,0,0.1);
}

.enviado{
background:#DCF8C6;
align-self:flex-end;
}

.recibido{
background:white;
align-self:flex-start;
}

/* HORA */

.hora{
font-size:11px;
color:#666;
margin-top:4px;
text-align:right;
}

/* BARRA ENVIAR */

#enviar{
display:flex;
padding:10px;
background:#f0f0f0;
border-top:1px solid #ccc;
}

#texto{
flex:1;
padding:12px 15px;
border-radius:25px;
border:none;
background:white;
outline:none;
font-size:14px;
}

button{
margin-left:10px;
padding:10px 20px;
border:none;
border-radius:20px;
background:#25D366;
color:white;
cursor:pointer;
}

button:hover{
background:#20b857;
}

</style>
</head>

<body>

<div id="clientes"></div>

<div id="chat">

<div id="header">
<img src="https://i.pravatar.cc/40">
<span id="titulo">Selecciona un chat</span>
</div>

<div id="mensajes"></div>

<div id="enviar">
<input id="texto" placeholder="Escribe un mensaje...">
<button onclick="enviar()">Enviar</button>
</div>

</div>

<script>

let numeroActual="";

/* CARGAR CLIENTES */

async function cargarClientes(){

const res = await fetch("/clientes");
const data = await res.json();

document.getElementById("clientes").innerHTML = data.map(c=>`

<div class="cliente" onclick="abrirChat('${c.numero}')">

<img src="https://i.pravatar.cc/40">

<div>
<b>${c.numero}</b>
</div>

</div>

`).join("");

}

/* ABRIR CHAT */

async function abrirChat(numero){

numeroActual=numero;

document.getElementById("titulo").innerText="Chat con "+numero;

const res = await fetch("/mensajes/"+numero);
const data = await res.json();

document.getElementById("mensajes").innerHTML = data.map(m=>`

<div class="mensaje ${m.tipo=="enviado" ? "enviado":"recibido"}">

${m.mensaje}

<div class="hora">
${new Date(m.fecha).toLocaleTimeString()}
</div>

</div>

`).join("");

scrollChat();

}

/* ENVIAR MENSAJE */

async function enviar(){

const texto = document.getElementById("texto").value;

if(!texto) return;

await fetch("/responder",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
numero:numeroActual,
mensaje:texto
})
});

document.getElementById("texto").value="";

abrirChat(numeroActual);

}

/* SCROLL AUTOMATICO */

function scrollChat(){
const chat = document.getElementById("mensajes");
chat.scrollTop = chat.scrollHeight;
}

/* AUTO ACTUALIZAR CHAT */

setInterval(()=>{

if(numeroActual){
abrirChat(numeroActual);
}

},3000);

cargarClientes();

</script>

</body>

</html>
