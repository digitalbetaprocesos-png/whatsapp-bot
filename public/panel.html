<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Panel de Atención</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Segoe UI, Arial;
background:#f0f2f5;
display:flex;
height:100vh;
}

/* SIDEBAR */

#sidebar{
width:320px;
background:white;
display:flex;
flex-direction:column;
border-right:1px solid #ddd;
}

/* HEADER */

#sidebarHeader{
background:#075E54;
color:white;
padding:18px;
font-size:18px;
font-weight:600;
}

/* BUSCADOR */

#buscar{
padding:12px;
border:none;
border-bottom:1px solid #eee;
outline:none;
font-size:14px;
}

/* CLIENTES */

#clientes{
flex:1;
overflow:auto;
}

.cliente{
padding:14px 18px;
border-bottom:1px solid #eee;
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:center;
transition:0.2s;
}

.cliente:hover{
background:#f5f5f5;
}

.activo{
background:#e6f7f3;
}

/* CHAT */

#chat{
flex:1;
display:flex;
flex-direction:column;
}

/* HEADER CHAT */

#header{
background:#075E54;
color:white;
padding:16px;
font-weight:600;
display:flex;
justify-content:space-between;
align-items:center;
}

/* MENSAJES */

#mensajes{
flex:1;
padding:25px;
overflow:auto;
display:flex;
flex-direction:column;
gap:12px;
background:#efeae2;
}

/* BURBUJAS */

.mensaje{
padding:10px 14px;
border-radius:12px;
max-width:65%;
font-size:14px;
line-height:1.4;
box-shadow:0 1px 1px rgba(0,0,0,0.1);
}

.enviado{
background:#d9fdd3;
align-self:flex-end;
}

.recibido{
background:white;
align-self:flex-start;
}

/* HORA */

.hora{
font-size:11px;
margin-top:4px;
color:#666;
text-align:right;
}

/* BARRA ENVIAR */

#enviar{
display:flex;
padding:12px;
background:white;
border-top:1px solid #ddd;
}

#texto{
flex:1;
padding:12px;
border-radius:25px;
border:1px solid #ccc;
outline:none;
font-size:14px;
}

#botonEnviar{
margin-left:10px;
padding:10px 22px;
border:none;
border-radius:25px;
background:#25D366;
color:white;
cursor:pointer;
font-weight:600;
}

#botonEnviar:hover{
background:#20b857;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div id="sidebar">

<div id="sidebarHeader">
Panel de Chats
</div>

<input id="buscar" placeholder="Buscar número...">

<div id="clientes"></div>

</div>

<!-- CHAT -->

<div id="chat">

<div id="header">
<span id="titulo">Selecciona un chat</span>
<span id="contador"></span>
</div>

<div id="mensajes"></div>

<div id="enviar">

<input id="texto" placeholder="Escribe un mensaje...">

<button id="botonEnviar" onclick="enviar()">
Enviar
</button>

</div>

</div>

<script>

let numeroActual="";
let listaClientes=[];

/* CARGAR CLIENTES */

async function cargarClientes(){

const res = await fetch("/clientes");
const data = await res.json();

const numerosUnicos = {};

data.forEach(c=>{

let limpio = c.numero.replace(/\D/g,"");

if(limpio.startsWith("521")){
limpio = limpio.slice(3);
}
else if(limpio.startsWith("52")){
limpio = limpio.slice(2);
}
else if(limpio.startsWith("1") && limpio.length === 11){
limpio = limpio.slice(1);
}
numerosUnicos[limpio] = limpio;

});

const lista = Object.values(numerosUnicos);

document.getElementById("clientes").innerHTML = lista.map(numero=>`

<div class="cliente" onclick="abrirChat('${numero}')">
📱 +52 ${numero.slice(0,3)} ${numero.slice(3,6)} ${numero.slice(6)}
</div>

`).join("");

}
/* MOSTRAR CLIENTES */

function mostrarClientes(data){

document.getElementById("clientes").innerHTML = data.map(c=>`

<div class="cliente" onclick="abrirChat('${c.numero}', this)">

<span>📱 ${c.numero}</span>

</div>

`).join("");

}

/* BUSCAR */

document.getElementById("buscar").addEventListener("input",(e)=>{

const texto = e.target.value.toLowerCase();

const filtrados = listaClientes.filter(c=>
c.numero.includes(texto)
);

mostrarClientes(filtrados);

});

/* ABRIR CHAT */

async function abrirChat(numero, elemento){

numeroActual=numero;

document.querySelectorAll(".cliente").forEach(c=>c.classList.remove("activo"));

if(elemento) elemento.classList.add("activo");

document.getElementById("titulo").innerText="Chat con "+numero;

const res = await fetch("/mensajes/"+numero);

const data = await res.json();

document.getElementById("contador").innerText=data.length+" mensajes";

document.getElementById("mensajes").innerHTML = data.map(m=>`

<div class="mensaje ${m.tipo=="enviado" ? "enviado":"recibido"}">

${m.mensaje}

<div class="hora">
${m.fecha ? new Date(m.fecha).toLocaleTimeString() : ""}
</div>

</div>

`).join("");

scrollChat();

}

/* ENVIAR */

async function enviar(){

const texto=document.getElementById("texto").value;

if(!texto || !numeroActual) return;

await fetch("/responder",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
numero:numeroActual,
mensaje:texto
})

});

document.getElementById("texto").value="";

abrirChat(numeroActual);

}

/* ENTER PARA ENVIAR */

document.getElementById("texto").addEventListener("keypress",(e)=>{

if(e.key==="Enter"){

enviar();

}

});

/* SCROLL */

function scrollChat(){

const chat=document.getElementById("mensajes");

chat.scrollTop=chat.scrollHeight;

}

/* AUTO ACTUALIZAR */

setInterval(()=>{

if(numeroActual){

abrirChat(numeroActual);

}

},3000);

cargarClientes();

</script>

</body>

</html>
