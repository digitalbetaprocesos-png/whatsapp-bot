<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Panel de Chats</title>

<style>

*{
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
display:flex;
height:100vh;
margin:0;
background:#f0f2f5;
}

/* SIDEBAR */

#sidebar{
width:30%;
background:white;
display:flex;
flex-direction:column;
border-right:1px solid #ddd;
}

/* HEADER SIDEBAR */

#sidebarHeader{
background:#075E54;
color:white;
padding:15px;
font-weight:bold;
}

/* BUSCADOR */

#buscar{
padding:10px;
border:none;
border-bottom:1px solid #eee;
outline:none;
}

/* LISTA CLIENTES */

#clientes{
flex:1;
overflow:auto;
}

.cliente{
padding:15px;
border-bottom:1px solid #eee;
cursor:pointer;
transition:0.2s;
}

.cliente:hover{
background:#f5f5f5;
}

/* CHAT */

#chat{
width:70%;
display:flex;
flex-direction:column;
}

/* HEADER CHAT */

#header{
background:#075E54;
color:white;
padding:15px;
font-weight:bold;
}

/* MENSAJES */

#mensajes{
flex:1;
overflow:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

/* BURBUJAS */

.mensaje{
padding:10px 14px;
border-radius:10px;
max-width:60%;
font-size:14px;
box-shadow:0 1px 1px rgba(0,0,0,0.1);
}

.enviado{
background:#DCF8C6;
align-self:flex-end;
}

.recibido{
background:white;
align-self:flex-start;
}

/* HORA */

.hora{
font-size:11px;
color:#777;
margin-top:5px;
text-align:right;
}

/* BARRA ENVIAR */

#enviar{
display:flex;
padding:10px;
background:#f0f2f5;
border-top:1px solid #ddd;
}

#texto{
flex:1;
padding:12px;
border-radius:25px;
border:1px solid #ccc;
outline:none;
}

button{
margin-left:10px;
padding:10px 20px;
border:none;
border-radius:25px;
background:#25D366;
color:white;
cursor:pointer;
}

button:hover{
background:#20b857;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div id="sidebar">

<div id="sidebarHeader">
Panel de chats
</div>

<input id="buscar" placeholder="Buscar número...">

<div id="clientes"></div>

</div>

<!-- CHAT -->

<div id="chat">

<div id="header">
Selecciona un chat
</div>

<div id="mensajes"></div>

<div id="enviar">

<input id="texto" placeholder="Escribe un mensaje...">

<button onclick="enviar()">
Enviar
</button>

</div>

</div>

<script>

let numeroActual="";
let listaClientes=[];

/* CARGAR CLIENTES */

async function cargarClientes(){

const res = await fetch("/clientes");
listaClientes = await res.json();

mostrarClientes(listaClientes);

}

/* MOSTRAR CLIENTES */

function mostrarClientes(data){

document.getElementById("clientes").innerHTML = data.map(c=>`

<div class="cliente" onclick="abrirChat('${c.numero}')">

📱 ${c.numero}

</div>

`).join("");

}

/* BUSCAR CLIENTES */

document.getElementById("buscar").addEventListener("input",(e)=>{

const texto = e.target.value.toLowerCase();

const filtrados = listaClientes.filter(c=>
c.numero.includes(texto)
);

mostrarClientes(filtrados);

});

/* ABRIR CHAT */

async function abrirChat(numero){

numeroActual = numero;

document.getElementById("header").innerText = "Chat con " + numero;

const res = await fetch("/mensajes/"+numero);
const data = await res.json();

document.getElementById("mensajes").innerHTML = data.map(m=>`

<div class="mensaje ${m.tipo=="enviado" ? "enviado":"recibido"}">

${m.mensaje}

<div class="hora">
${m.fecha ? new Date(m.fecha).toLocaleTimeString() : ""}
</div>

</div>

`).join("");

scrollChat();

}

/* ENVIAR MENSAJE */

async function enviar(){

const texto = document.getElementById("texto").value;

if(!texto || !numeroActual) return;

await fetch("/responder",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

numero:numeroActual,
mensaje:texto

})

});

document.getElementById("texto").value="";

abrirChat(numeroActual);

}

/* SCROLL */

function scrollChat(){

const chat = document.getElementById("mensajes");

chat.scrollTop = chat.scrollHeight;

}

/* AUTO ACTUALIZAR CHAT */

setInterval(()=>{

if(numeroActual){

abrirChat(numeroActual);

}

},3000);

cargarClientes();

</script>

</body>

</html>
