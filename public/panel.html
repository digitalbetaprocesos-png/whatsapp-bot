<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Panel de Atención</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Segoe UI, Arial;
background:#f0f2f5;
display:flex;
height:100vh;
}

/* SIDEBAR */

#sidebar{
width:320px;
background:white;
display:flex;
flex-direction:column;
border-right:1px solid #ddd;
}

/* HEADER */

#sidebarHeader{
background:#075E54;
color:white;
padding:18px;
font-size:18px;
font-weight:600;
}

/* BUSCADOR */

#buscar{
padding:12px;
border:none;
border-bottom:1px solid #eee;
outline:none;
font-size:14px;
}

/* CLIENTES */

#clientes{
flex:1;
overflow:auto;
}

.cliente{
padding:14px 18px;
border-bottom:1px solid #eee;
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:center;
transition:0.2s;
}

.cliente:hover{
background:#f5f5f5;
}

.activo{
background:#e6f7f3;
}

/* CHAT */

#chat{
flex:1;
display:flex;
flex-direction:column;
}

/* HEADER CHAT */

#header{
background:#075E54;
color:white;
padding:16px;
font-weight:600;
display:flex;
justify-content:space-between;
align-items:center;
}

/* MENSAJES */

#mensajes{
flex:1;
padding:25px;
overflow:auto;
display:flex;
flex-direction:column;
gap:12px;
background:#efeae2;
}

/* BURBUJAS */

.mensaje{
padding:10px 14px;
border-radius:12px;
max-width:65%;
font-size:14px;
line-height:1.4;
box-shadow:0 1px 1px rgba(0,0,0,0.1);
position:relative;
}

.enviado{
background:#d9fdd3;
align-self:flex-end;
}

.recibido{
background:white;
align-self:flex-start;
}

/* FLECHAS */

.enviado::after{
content:"";
position:absolute;
right:-6px;
top:10px;
border-left:6px solid #d9fdd3;
border-top:6px solid transparent;
border-bottom:6px solid transparent;
}

.recibido::after{
content:"";
position:absolute;
left:-6px;
top:10px;
border-right:6px solid white;
border-top:6px solid transparent;
border-bottom:6px solid transparent;
}

/* HORA */

.hora{
font-size:11px;
margin-top:4px;
color:#666;
text-align:right;
}
/* ESTADO */

.estado{
font-size:12px;
margin-left:5px;
cursor:pointer;
color:#777;
}

.leido{
color:#2196f3;
}

/* FAVORITO */

.favorito{
margin-left:6px;
cursor:pointer;
}

/* ETIQUETAS CRM */

.etiquetas{
display:flex;
gap:5px;
margin-top:5px;
}
.tag{
font-size:11px;
padding:3px 6px;
border-radius:10px;
color:white;
}

.nuevo{
background:#25D366;
}

.pendiente{
background:#FFC107;
color:black;
}

.urgente{
background:#e53935;
}

#etiquetaSelect{
padding:5px;
border-radius:6px;
border:none;
margin-right:10px;
font-size:13px;
}
/* BARRA ENVIAR */

#enviar{
display:flex;
padding:12px;
background:white;
border-top:1px solid #ddd;
}

#texto{
flex:1;
padding:12px;
border-radius:25px;
border:1px solid #ccc;
outline:none;
font-size:14px;
}

#botonEnviar{
margin-left:10px;
padding:10px 22px;
border:none;
border-radius:25px;
background:#25D366;
color:white;
cursor:pointer;
font-weight:600;
}

#botonEnviar:hover{
background:#20b857;
}
#infoPanel{
width:260px;
background:white;
border-left:1px solid #ddd;
display:flex;
flex-direction:column;
}

#infoHeader{
padding:16px;
background:#f5f5f5;
font-weight:600;
border-bottom:1px solid #eee;
}

.infoBloque{
padding:15px;
}

.infoTitulo{
font-size:14px;
font-weight:600;
margin-bottom:10px;
}

#listaEtiquetas{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-bottom:10px;
}

.tagCRM{
background:#e7f3ff;
padding:5px 8px;
border-radius:6px;
font-size:12px;
}

#nuevaEtiqueta{
width:100%;
padding:8px;
border:1px solid #ccc;
border-radius:6px;
margin-bottom:8px;
}

#infoPanel button{
width:100%;
padding:8px;
border:none;
background:#25D366;
color:white;
border-radius:6px;
cursor:pointer;
}
</style>

</head>

<body>

<div id="sidebar">

<div id="sidebarHeader">
Panel de Chats
</div>

<input id="buscar" placeholder="Buscar número...">

<div id="clientes"></div>

</div>

<div id="chat">

<div id="header">

<span id="titulo">Selecciona un chat</span>

<div>

<select id="etiquetaSelect" onchange="guardarEtiqueta()">

<option value="">Etiqueta</option>
<option value="nuevo">🟢 Nuevo</option>
<option value="pendiente">🟡 Pendiente</option>
<option value="urgente">🔴 Urgente</option>

</select>

<button onclick="borrarChat()" style="
background:#e53935;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
margin-right:10px;
cursor:pointer;">
🗑 Borrar
</button>

<span id="contador"></span>

</div>

</div>
<div id="mensajes"></div>

<div id="enviar">

<input id="texto" placeholder="Escribe un mensaje...">

<button id="botonEnviar" onclick="enviar()">
Enviar
</button>

</div>

</div>
<div id="infoPanel">

<div id="infoHeader">
Información de contacto
</div>

<div class="infoBloque">

<div class="infoTitulo">
Etiquetas
</div>

<div id="listaEtiquetas"></div>

<input id="nuevaEtiqueta" placeholder="Añade una etiqueta">

<button onclick="agregarEtiqueta()">
Agregar
</button>

</div>

</div>

<script>

let numeroActual="";
let listaClientes=[];

/* CARGAR CLIENTES */

async function cargarClientes(){

const res = await fetch("/clientes");
const data = await res.json();

const numerosUnicos = {};

data.forEach(c=>{

let limpio = c.numero.replace(/\D/g,"");

if(limpio.startsWith("521")){
limpio = limpio.slice(3);
}
else if(limpio.startsWith("52")){
limpio = limpio.slice(2);
}
else if(limpio.startsWith("1") && limpio.length === 11){
limpio = limpio.slice(1);
}

numerosUnicos[limpio] = true;

});

const lista = Object.keys(numerosUnicos);

document.getElementById("clientes").innerHTML = lista.map(numero=>`

<div class="cliente" onclick="abrirChat('${numero}', this)">
👤 Cliente
<br>
📱 +52 ${numero.slice(0,3)} ${numero.slice(3,6)} ${numero.slice(6)}
</div>

`).join("");

}
/* ABRIR CHAT */
async function abrirChat(numero,elemento){

numeroActual=numero;

document.querySelectorAll(".cliente").forEach(c=>c.classList.remove("activo"));

if(elemento) elemento.classList.add("activo");

document.getElementById("titulo").innerText="Chat con "+numero;

const res=await fetch("/mensajes/"+numero);
const data=await res.json();

document.getElementById("contador").innerText=data.length+" mensajes";

document.getElementById("mensajes").innerHTML=data.map(m=>`

<div class="mensaje ${m.tipo==="bot"?"enviado":"recibido"}">

${m.mensaje}

<div class="hora">

${m.fecha?new Date(m.fecha).toLocaleTimeString():""}

<span class="estado ${m.leido?"leido":""}" onclick="marcarLeido('${m._id}')">

${m.leido?"✔✔":"✔"}

</span>

<span class="favorito" onclick="favorito('${m._id}')">

${m.favorito?"⭐":""}

</span>

</div>

<div class="etiquetas">

${m.tag==="nuevo"?'<span class="tag nuevo">Nuevo</span>':""}
${m.tag==="pendiente"?'<span class="tag pendiente">Pendiente</span>':""}
${m.tag==="urgente"?'<span class="tag urgente">Urgente</span>':""}

</div>

</div>

`).join("");

scrollChat();
cargarEtiquetas();

}

/* FUNCIONES CRM */

async function favorito(id){

await fetch("/favorito/"+id,{
method:"POST"
});

abrirChat(numeroActual);

}

async function marcarLeido(id){

await fetch("/leido/"+id,{
method:"POST"
});

abrirChat(numeroActual);

}

async function guardarEtiqueta(){

const etiqueta = document.getElementById("etiquetaSelect").value;

if(!numeroActual) return;

await fetch("/etiqueta",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
numero:numeroActual,
tag:etiqueta
})

});

}
async function agregarEtiqueta(){

const tag = document.getElementById("nuevaEtiqueta").value;

if(!tag || !numeroActual) return;

await fetch("/etiqueta",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
numero:numeroActual,
tag
})

});

document.getElementById("nuevaEtiqueta").value="";

cargarEtiquetas();

}
async function cargarEtiquetas(){

const res = await fetch("/etiquetas/"+numeroActual);

const data = await res.json();

document.getElementById("listaEtiquetas").innerHTML =
data.map(e=>`<span class="tagCRM">${e}</span>`).join("");

}
/* ENVIAR */

async function enviar(){

const texto=document.getElementById("texto").value;

if(!texto || !numeroActual) return;

await fetch("/responder",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
numero:numeroActual,
mensaje:texto
})

});

document.getElementById("texto").value="";

abrirChat(numeroActual);

}

/* ENTER PARA ENVIAR */

document.getElementById("texto").addEventListener("keypress",(e)=>{

if(e.key==="Enter"){
enviar();
}

});
async function borrarChat(){

if(!numeroActual) return;

const confirmar = confirm("¿Borrar toda la conversación?");

if(!confirmar) return;

await fetch("/borrar/"+numeroActual,{
method:"DELETE"
});

document.getElementById("mensajes").innerHTML="";
document.getElementById("contador").innerText="0 mensajes";

}

/* SCROLL */

function scrollChat(){

const chat = document.getElementById("mensajes");

const estaAbajo = chat.scrollHeight - chat.scrollTop - chat.clientHeight < 100;

if(estaAbajo){
chat.scrollTop = chat.scrollHeight;
}

}
/* AUTO ACTUALIZAR */

setInterval(()=>{

if(numeroActual){
abrirChat(numeroActual);
}

},3000);

cargarClientes();

</script>

</body>

</html>
