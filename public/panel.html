<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Panel de Atención</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Segoe UI, Arial;
background:#f0f2f5;
display:flex;
height:100vh;
}

/* SIDEBAR */

#sidebar{
width:320px;
background:white;
display:flex;
flex-direction:column;
border-right:1px solid #ddd;
}

/* HEADER */

#sidebarHeader{
background:#075E54;
color:white;
padding:18px;
font-size:18px;
font-weight:600;
}

/* BUSCADOR */

#buscar{
  border-radius:20px;
  margin:10px;
  padding:10px 15px;
  background:#f0f2f5;
  border:none;
}

/* CLIENTES */

#clientes{
flex:1;
overflow:auto;
}

.cliente{
  padding:14px 18px;
  border-bottom:1px solid #eee;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:0.2s;
  border-radius:8px;
  margin:4px 8px;
}

.cliente:hover{
  background:#f0fdf4;
  transform:scale(1.01);
}

.activo{
  background:#d1f2eb;
  border-left:4px solid #25D366;
}

/* CHAT */

#chat{
flex:1;
display:flex;
flex-direction:column;
}

/* HEADER CHAT */

#header{
  background: linear-gradient(90deg, #075E54, #128C7E);
  color:white;
  padding:16px;
  font-weight:600;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* MENSAJES */

#mensajes{
    flex:1;
    overflow-y:auto;
    padding:20px;
    background:#e5ddd5;
    display:flex;
    flex-direction:column;
}

.mensaje{
    max-width:65%;
    min-width:80px;
    padding:12px 14px;
    border-radius:12px;
    margin-bottom:10px;
    position:relative;
    font-size:14px;
    line-height:1.4;
    word-wrap:break-word;
}

.enviado{
    align-self:flex-end;
    background:#d9fdd3;
}

.recibido{
    align-self:flex-start;
    background:#fff;
}

#chat{
    flex:1;
    display:flex;
    flex-direction:column;
    height:100vh;
}

/* FLECHAS */

.enviado::after{
content:"";
position:absolute;
right:-6px;
top:10px;
border-left:6px solid #d9fdd3;
border-top:6px solid transparent;
border-bottom:6px solid transparent;
}

.recibido::after{
content:"";
position:absolute;
left:-6px;
top:10px;
border-right:6px solid white;
border-top:6px solid transparent;
border-bottom:6px solid transparent;
}

/* HORA */

.hora{
font-size:11px;
margin-top:4px;
color:#666;
text-align:right;
}
/* ESTADO */

.estado{
font-size:12px;
margin-left:5px;
cursor:pointer;
color:#777;
}

.leido{
color:#2196f3;
}

/* FAVORITO */

.favorito{
margin-left:6px;
cursor:pointer;
}
/* BARRA ENVIAR */

#enviar{
display:flex;
padding:12px;
background:white;
border-top:1px solid #ddd;
}

#texto{
  flex:1;
  padding:14px;
  border-radius:25px;
  border:none;
  background:#f0f2f5;
  font-size:14px;
}
#texto:focus{
  background:white;
  box-shadow:0 0 0 2px #25D36633;
}

#botonEnviar{
margin-left:10px;
padding:10px 22px;
border:none;
border-radius:25px;
background:#25D366;
color:white;
cursor:pointer;
font-weight:600;
}

#botonEnviar:hover{
background:#20b857;
}
#infoPanel{
  width:260px;
  background:#fafafa;
  border-left:1px solid #ddd;
  display:flex;
  flex-direction:column;
}

#infoHeader{
padding:16px;
background:#f5f5f5;
font-weight:600;
border-bottom:1px solid #eee;
}

.infoBloque{
padding:15px;
}

.infoTitulo{
font-size:14px;
font-weight:600;
margin-bottom:10px;
}

#listaEtiquetas{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-bottom:10px;
}

.tagCRM{
background:#e7f3ff;
padding:5px 8px;
border-radius:6px;
font-size:12px;
}

#nuevaEtiqueta{
width:100%;
padding:8px;
border:1px solid #ccc;
border-radius:6px;
margin-bottom:8px;
}

#infoPanel button{
width:100%;
padding:8px;
border:none;
background:#25D366;
color:white;
border-radius:6px;
cursor:pointer;
}
.menuOpciones{
position:absolute;
right:0;
top:20px;
background:white;
border:1px solid #ddd;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.2);
z-index:100;
min-width:150px;
}

.menuOpciones div{
padding:10px;
cursor:pointer;
font-size:14px;
}

.menuOpciones div:hover{
background:#f5f5f5;
}
body{
  background: linear-gradient(135deg, #eae6df, #dcdcdc);
}

#sidebar, #chat, #infoPanel{
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}
button{
  border-radius:20px;
  padding:8px 16px;
  font-size:13px;
  transition:0.2s;
}

button:hover{
  transform:scale(1.05);
}
#estadoEnvio{
    position:fixed;
    bottom:90px;
    right:20px;

    background:#323232;
    color:white;

    padding:12px 18px;
    border-radius:10px;

    font-size:14px;

    opacity:0;
    transform:translateY(20px);

    transition:.3s;

    z-index:9999;
}

#estadoEnvio.mostrar{
    opacity:1;
    transform:translateY(0);
}

#estadoEnvio.enviando{
    background:#1976d2;
}

#estadoEnvio.ok{
    background:#2e7d32;
}

#estadoEnvio.error{
    background:#d32f2f;
}
.modalArchivo{

    position:fixed;
    inset:0;

    background:rgba(0,0,0,.45);

    display:none;

    justify-content:center;
    align-items:center;

    z-index:99999;

}

.contenidoModal{

    width:380px;

    background:white;

    border-radius:15px;

    padding:20px;

    text-align:center;

    animation:fadeIn .2s;

}

#previewImagen{

    max-width:100%;

    max-height:250px;

    display:none;

    border-radius:10px;

    margin:15px 0;

}

#nombreArchivo{

    font-weight:bold;

    margin-top:10px;

}

#tamArchivo{

    color:#777;

    margin-top:6px;

    font-size:13px;

}

.botonesModal{

    display:flex;

    justify-content:space-between;

    margin-top:20px;

}

.botonesModal button{

    width:48%;

    padding:10px;

}
.mensaje{
    position:relative;
}

.menuMensajeBtn{
    position:absolute;
    top:-8px;
    right:-8px;

    width:24px;
    height:24px;

    display:none;
    align-items:center;
    justify-content:center;

    background:white;
    border-radius:50%;
    box-shadow:0 1px 5px rgba(0,0,0,.2);

    cursor:pointer;
    color:#666;
    font-size:14px;

    z-index:10;
}

.mensaje:hover .menuMensajeBtn{
    display:flex;
}

.menuMensaje{

    position:absolute;

    top:28px;
    right:8px;

    background:white;

    border-radius:8px;

    box-shadow:0 4px 12px rgba(0,0,0,.2);

    min-width:180px;

    display:none;

    z-index:500;

    overflow:hidden;

}

.menuMensaje div{

    padding:11px 14px;

    cursor:pointer;

    font-size:14px;

}

.menuMensaje div:hover{

    background:#f5f5f5;

}
@keyframes fadeIn{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}
.infoBloque input,
.infoBloque textarea{
  width:100%;
  margin-bottom:8px;
  padding:8px;
  border-radius:6px;
  border:1px solid #ddd;
}
#clientes::-webkit-scrollbar,
#mensajes::-webkit-scrollbar{
  width:6px;
}

#clientes::-webkit-scrollbar-thumb,
#mensajes::-webkit-scrollbar-thumb{
  background:#ccc;
  border-radius:10px;
}
</style>

</head>

<body>

<div id="sidebar">

<div id="sidebarHeader">
Panel de Chats
</div>

<input id="buscar" placeholder="Buscar número...">
<input type="date" id="fechaInicio">
<input type="date" id="fechaFin">

<button onclick="exportarFiltrado()">📥 Descargar cotizaciones</button>

<div id="clientes"></div>

</div>

<div id="chat">

<div id="header">

<span id="titulo">Selecciona un chat</span>

<div>


<button onclick="borrarChat()" style="
background:#e53935;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
margin-right:10px;
cursor:pointer;">
🗑 Borrar
</button>
</button>
<button onclick="activarHumano()">👨‍💼 Tomar control</button>
<button onclick="activarBot()">🤖 Activar bot</button>

<span id="contador"></span>

</div>

</div>
<div id="mensajes"></div>

<div id="enviar">
<div id="estadoEnvio"></div>

<input
type="file"
id="archivo"
style="display:none"
onchange="mostrarPreviewArchivo()">

<input id="texto" placeholder="Escribe un mensaje...">

<button
id="btnArchivo"
onclick="document.getElementById('archivo').click()">
📎
</button>

<button id="botonEnviar" onclick="enviar()">
Enviar
</button>

</div>

</div>
<div id="infoPanel">

<div id="infoHeader">
Información de contacto
</div>

<div class="infoBloque">

<div class="infoTitulo">
Etiquetas
</div>

<div id="listaEtiquetas"></div>

<input id="nuevaEtiqueta" placeholder="Añade una etiqueta">

<button onclick="agregarEtiqueta()">
Agregar
</button>
<div class="infoTitulo">Contacto</div>

<input id="nombreContacto" placeholder="Nombre">

<input id="empresaContacto" placeholder="Empresa">

<input id="correoContacto" placeholder="Correo">

<textarea id="notasContacto" placeholder="Notas"></textarea>

<button onclick="guardarContacto()">Guardar contacto</button>
</div>

</div>
<div id="modalArchivo" class="modalArchivo">

    <div class="contenidoModal">

        <h3>📎 Archivo seleccionado</h3>

        <img id="previewImagen">

        <div id="iconoArchivo" style="font-size:70px;display:none;">
            📄
        </div>

        <div id="nombreArchivo"></div>

        <div id="tamArchivo"></div>

        <div class="botonesModal">

            <button id="cancelarArchivo">
                Cancelar
            </button>

            <button id="confirmarArchivo">
                Enviar
            </button>

        </div>

    </div>

</div>
<script>

let numeroActual="";
let listaClientes=[];
function formatearFecha(fecha){

const f = new Date(fecha);
const hoy = new Date();

const esHoy = f.toDateString() === hoy.toDateString();

if(esHoy){
return f.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
}

return f.toLocaleDateString();
}
async function cargarClientes(){

const res = await fetch("/clientes");
const data = await res.json();

document.getElementById("clientes").innerHTML = data.map(c=>{

let numero = c.numero.replace(/\D/g,"");

if(numero.startsWith("521")){
numero = numero.slice(3);
}
else if(numero.startsWith("52")){
numero = numero.slice(2);
}
else if(numero.startsWith("1") && numero.length === 11){
numero = numero.slice(1);
}

return `
<div class="cliente">

  <!-- IZQUIERDA -->
  <div onclick="abrirChat('${numero}', this)" style="flex:1;">
    👤 <b>${c.nombre || "Cliente"}</b><br>
    📱 +52 ${numero.slice(0,3)} ${numero.slice(3,6)} ${numero.slice(6)}
    <br>
    <small style="color:gray;">
      ${c.ultimoMensaje ? c.ultimoMensaje.substring(0, 30) + "..." : ""}
    </small>
  </div>

  <!-- DERECHA -->
  <div style="display:flex; align-items:center; gap:8px;">

    <!-- FECHA + BADGE -->
    <div style="text-align:right;">
      <small style="color:gray;">
        ${c.fecha ? formatearFecha(c.fecha) : ""}
      </small><br>

      ${c.noLeidos > 0 ? `
      <span style="
      background:#25D366;
      color:white;
      border-radius:50%;
      padding:4px 7px;
      font-size:11px;
      ">
      ${c.noLeidos}
      </span>
      ` : c.marcadoNoLeido ? `
      <span style="
      width:8px;
      height:8px;
      background:#25D366;
      border-radius:50%;
      display:inline-block;
      "></span>
      ` : ""}

    </div>

    <!-- ⋮ MENU -->
    <div style="position:relative;">
      <span onclick="toggleMenu(event, '${numero}')" style="cursor:pointer; font-size:18px;">
        ⋮
      </span>

      <div id="menu-${numero}" class="menuOpciones" style="display:none;">
        <div onclick="marcarNoLeidoDesdeMenu('${numero}')">Marcar no leído</div>
        <div onclick="borrarChatDesdeMenu('${numero}')">Borrar chat</div>
      </div>
    </div>

  </div>

</div>
`;

}).join("");

}
/* ABRIR CHAT */
async function abrirChat(numero,elemento){

numeroActual=numero;

await fetch("/marcar-leidos/"+numero, {
method:"POST"
});

document.querySelectorAll(".cliente").forEach(c=>c.classList.remove("activo"));

if(elemento) elemento.classList.add("activo");

const nombre = listaClientes[numero] || "Cliente";

let nombreFinal = nombre;

// 🔥 traer nombre real del contacto
const resContacto = await fetch("/contacto/" + numero);
const contacto = await resContacto.json();


if (contacto) {
  document.getElementById("nombreContacto").value = contacto.nombre || "";
  document.getElementById("empresaContacto").value = contacto.empresa || "";
  document.getElementById("correoContacto").value = contacto.correo || "";
  document.getElementById("notasContacto").value = contacto.notas || "";
} else {
  // Si no hay datos previos, limpiar los campos o dejar solo el nombre por defecto
  document.getElementById("nombreContacto").value = listaClientes[numero] || "Cliente";
  document.getElementById("empresaContacto").value = "";
  document.getElementById("correoContacto").value = "";
  document.getElementById("notasContacto").value = "";
}
// ----------------------------------------------------
if(contacto && contacto.nombre){
  nombreFinal = contacto.nombre;
}

document.getElementById("titulo").innerText = nombreFinal + " (" + numero + ")";const res=await fetch("/mensajes/"+numero);
const data=await res.json();

document.getElementById("contador").innerText=data.length+" mensajes";

document.getElementById("mensajes").innerHTML=data.map(m=>`

<div class="mensaje ${(m.tipo==="bot"|| m.tipo==="humano")?"enviado":"recibido"}">
  <div class="menuMensajeBtn"
onclick="toggleMenuMensaje(event,'${m._id}')">

⋮

</div>

<div
id="menuMensaje-${m._id}"
class="menuMensaje">

<div onclick="copiarMensaje('${(m.mensaje||'').replace(/`/g,'\\`')}')">
📋 Copiar
</div>

<div onclick="responderMensaje('${m._id}')">
↩ Responder
</div>

<div onclick="favorito('${m._id}')">
⭐ Destacar
</div>

<div onclick="infoMensaje('${m._id}')">
📄 Información
</div>

<div onclick="fijarMensaje('${m._id}')">
📌 Fijar mensaje
</div>

</div>

${m.mediaType === "image"
?`<img src="${m.mediaUrl}" 
style="max-width:250px;border-radius:10px;">`
: m.mediaUrl
? `<a href="${m.mediaUrl}"
target="_blank">
Abrir Archivo
<a>`
  :m.mensaje
}
<div class="hora">

${m.fecha?new Date(m.fecha).toLocaleTimeString():""}

<span class="estado ${m.leido?"leido":""}" onclick="marcarLeido('${m._id}')">

${m.leido?"✔✔":"✔"}

</span>

<span class="favorito" onclick="favorito('${m._id}')">

${m.favorito?"⭐":""}

</span>

</div>

<div class="etiquetas">

${m.tag==="nuevo"?'<span class="tag nuevo">Nuevo</span>':""}
${m.tag==="pendiente"?'<span class="tag pendiente">Pendiente</span>':""}
${m.tag==="urgente"?'<span class="tag urgente">Urgente</span>':""}

</div>

</div>

`).join("");
setTimeout(()=>{
scrollChat();
}, 100);
cargarEtiquetas();
cargarContacto();
}

/* FUNCIONES CRM */

async function favorito(id){

await fetch("/favorito/"+id,{
method:"POST"
});

abrirChat(numeroActual);

}

async function marcarLeido(id){

await fetch("/leido/"+id,{
method:"POST"
});

abrirChat(numeroActual);

}

async function guardarEtiqueta(){

const etiqueta = document.getElementById("etiquetaSelect").value;

if(!numeroActual) return;

await fetch("/etiqueta",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
numero:numeroActual,
tag:etiqueta
})

});

}
async function agregarEtiqueta(){

const tag = document.getElementById("nuevaEtiqueta").value.trim();

if(!tag || !numeroActual) return;

await fetch("/etiqueta",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    numero:numeroActual,
    tag
  })
});

document.getElementById("nuevaEtiqueta").value="";

// 🔥 refrescar
cargarEtiquetas();
}
async function eliminarEtiqueta(tag){

console.log("Eliminar:", numeroActual, tag);

if(!numeroActual) return;

await fetch("/eliminar-etiqueta",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
numero:numeroActual,
tag
})
});

cargarEtiquetas();
}
async function cargarEtiquetas(){

console.log("Numero actual:", numeroActual);

const res = await fetch("/etiquetas/" + numeroActual);
const data = await res.json();

console.log("Etiquetas recibidas:", data);

document.getElementById("listaEtiquetas").innerHTML =
data.map(e=>`
<span class="tagCRM">
${e}
<span onclick="eliminarEtiqueta('${e}')" style="margin-left:5px; cursor:pointer; color:red;">✖</span>
</span>
`).join("");
}
/* ENVIAR */

async function enviar(){

const texto=document.getElementById("texto").value;

if(!texto || !numeroActual) return;

mostrarEstado("⏳ Enviando...", "enviando");

try{

    const respuesta = await fetch("/responder",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            numero:numeroActual,
            mensaje:texto
        })
    });

    if(!respuesta.ok){
        throw new Error();
    }

    mostrarEstado("✔ Mensaje enviado","ok");

    document.getElementById("texto").value="";

    abrirChat(numeroActual);

}catch(error){

    mostrarEstado("❌ Error al enviar","error");

}

document.getElementById("texto").value="";

abrirChat(numeroActual);

}
async function enviarArchivo(){
const archivo =
document.getElementById("archivo").files[0];
if (!archivo || !numeroActual) return;
const formData = new FormData();
formData.append("archivo", archivo);
formData.append("numero", numeroActual);
await fetch("/enviar-archivo",{
  method:"POST",
  body: formData
});
document.getElementById("archivo").value=" ";
abrirChat(numeroActual);
}

/* ENTER PARA ENVIAR */

document.getElementById("texto").addEventListener("keypress",(e)=>{

if(e.key==="Enter"){
enviar();
}

});

async function borrarChat(){

if(!numeroActual) return;

const confirmar = confirm("¿Borrar toda la conversación?");

if(!confirmar) return;

await fetch("/borrar/"+numeroActual,{
method:"DELETE"
});

document.getElementById("mensajes").innerHTML="";
document.getElementById("contador").innerText="0 mensajes";

}

/* SCROLL */

function scrollChat(){

const chat = document.getElementById("mensajes");

// ir SIEMPRE hasta abajo
chat.scrollTop = chat.scrollHeight;

}async function guardarContacto(){

const nombre = document.getElementById("nombreContacto").value;
const empresa = document.getElementById("empresaContacto").value;
const correo = document.getElementById("correoContacto").value;
const notas = document.getElementById("notasContacto").value;

await fetch("/guardar-contacto",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
numero:numeroActual,
nombre,
empresa,
correo,
notas
})

});

alert("Contacto guardado");

}
async function activarHumano(){
  await fetch("/activar-humano",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({numero: numeroActual})
  });
}

async function activarBot(){
  await fetch("/activar-bot",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({numero: numeroActual})
  });
}
function exportarCotizaciones(){
  window.open("/exportar-cotizaciones", "_blank");
}
function exportarFiltrado(){

const inicio = document.getElementById("fechaInicio").value;
const fin = document.getElementById("fechaFin").value;

let url = "/exportar-cotizaciones";

if(inicio && fin){
  url += `?inicio=${inicio}&fin=${fin}`;
}

window.open(url, "_blank");

}
function toggleMenu(e, numero){
e.stopPropagation();

const menu = document.getElementById("menu-"+numero);

// cerrar todos primero
document.querySelectorAll(".menuOpciones").forEach(m=>{
  if(m !== menu) m.style.display = "none";
});

// toggle
menu.style.display = menu.style.display === "block" ? "none" : "block";
}
async function marcarNoLeidoDesdeMenu(numero){

await fetch("/marcar-no-leido/" + numero, {
method:"POST"
});

cargarClientes();
if(numeroActual === numero){
  document.getElementById("mensajes").innerHTML = "";
  document.getElementById("titulo").innerText = "Selecciona un chat";
  numeroActual = "";
}
}
/* AUTO ACTUALIZAR */

setInterval(async()=>{

if(!numeroActual) return;
const res=await fetch("/mensajes/"+numeroActual)
const data=await res.json();
document.getElementById("contador").innerText=data.length+"mensajes";

},3000);

cargarClientes();

// Escuchar lo que el usuario escribe en la barra de búsqueda
document.getElementById("buscar").addEventListener("input", (e) => {
  const termino = e.target.value.toLowerCase().trim();
  const clientesHTML = document.querySelectorAll("#clientes .cliente");

  clientesHTML.forEach(cliente => {
    // Obtenemos el texto completo dentro de la tarjeta del cliente (nombre y número)
    const textoCliente = cliente.innerText.toLowerCase();

    // Si coincide con lo que se busca, se queda; si no, se oculta
    if (textoCliente.includes(termino)) {
      cliente.style.display = "flex";
    } else {
      cliente.style.display = "none";
    }
  });
});

<script>
function nuevoChat() {
  //  Pedir el número de 10 dígitos
  let numero = prompt("Introduce el número de WhatsApp (A 10 dígitos, ej: 4611234567):");
  
  if (!numero) return; 

  //  Limpiar caracteres extra
  numero = numero.replace(/\D/g, "");

  // Si el usuario olvida poner el 52, se le agrega automáticamente
  if (numero.length === 10) {
    numero = "52" + numero;
  }

  if (numero.length < 12) {
    alert("Por favor, introduce un número válido con clave lada (10 dígitos).");
    return;
  }

  // 
  // Guarda el número limpio con el 52 incluido
  numeroActual = numero; 
  
  // Quitamos el diseño activo de los otros clientes
  document.querySelectorAll(".cliente").forEach(c => c.classList.remove("activo"));
  
  // Pone el título del chat listo
  document.getElementById("titulo").innerText = "Cliente Nuevo (+" + numero + ")";
  
  // Limpia la pantalla de chat para el nuevo mensaje
  document.getElementById("mensajes").innerHTML = `
    <div style="text-align:center; color:gray; margin-top:20px; font-size:13px;">
      Conversación nueva con +${numero.slice(0,2)} ${numero.slice(2,5)} ${numero.slice(5,8)} ${numero.slice(8)}<br>
      Escribe tu mensaje abajo y presiona Enviar.
    </div>
  `;
  document.getElementById("contador").innerText = "0 mensajes";
  
  // Limpia campos de contacto
  document.getElementById("nombreContacto").value = "";
  document.getElementById("empresaContacto").value = "";
  document.getElementById("correoContacto").value = "";
  document.getElementById("notasContacto").value = "";
}
function mostrarEstado(texto,tipo){

    const estado = document.getElementById("estadoEnvio");

    estado.innerHTML = texto;

    estado.className = "";
    estado.classList.add("mostrar");
    estado.classList.add(tipo);

    clearTimeout(estado.timer);

    estado.timer = setTimeout(()=>{
        estado.classList.remove("mostrar");
    },2500);

}
function mostrarPreviewArchivo(){

    const archivo =
    document.getElementById("archivo").files[0];

    if(!archivo) return;

    document.getElementById("modalArchivo").style.display="flex";

    document.getElementById("nombreArchivo").innerText=archivo.name;

    document.getElementById("tamArchivo").innerText=
    (archivo.size/1024/1024).toFixed(2)+" MB";

    const preview=document.getElementById("previewImagen");

    const icono=document.getElementById("iconoArchivo");

    if(archivo.type.startsWith("image/")){

        preview.style.display="block";

        icono.style.display="none";

        preview.src=URL.createObjectURL(archivo);

    }else{

        preview.style.display="none";

        icono.style.display="block";

    }

}
function toggleMenuMensaje(e,id){

    e.stopPropagation();

    document.querySelectorAll(".menuMensaje").forEach(menu=>{

        if(menu.id!="menuMensaje-"+id){

            menu.style.display="none";

        }

    });

    const menu=document.getElementById("menuMensaje-"+id);

    menu.style.display=
    menu.style.display=="block"
    ?"none"
    :"block";

}
document.addEventListener("click",()=>{

    document.querySelectorAll(".menuMensaje").forEach(menu=>{

        menu.style.display="none";

    });

});
async function copiarMensaje(texto){

    if(!texto) return;

    await navigator.clipboard.writeText(texto);

}
